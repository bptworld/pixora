; Pixora firmware rebuild for Adafruit MatrixPortal S3.
; Build with PlatformIO:
;   pio run -e matrixportal_s3_64x32
;   pio run -e matrixportal_s3_128x32

[platformio]
default_envs = matrixportal_s3_64x32

[env]
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
lib_deps =
  bblanchon/ArduinoJson@^7.4.2
  adafruit/Adafruit Protomatter@^1.7.0
build_flags =
  -D PIXORA_VERSION=\"2.0.0-rebuild\"
  -D PIXORA_DEVICE_TARGET=\"matrixportal-s3\"
  -D PIXORA_PANEL_HEIGHT=32
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MSC_ON_BOOT=0
  -D ARDUINO_USB_DFU_ON_BOOT=0
  -D CORE_DEBUG_LEVEL=3

[env:matrixportal_s3_64x32]
build_flags =
  ${env.build_flags}
  -D PIXORA_PANEL_WIDTH=64
  -D PIXORA_PANEL_CHAIN=1

[env:matrixportal_s3_128x32]
build_flags =
  ${env.build_flags}
  -D PIXORA_PANEL_WIDTH=128
  -D PIXORA_PANEL_CHAIN=2
