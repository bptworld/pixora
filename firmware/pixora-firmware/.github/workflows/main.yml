name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    strategy:
      fail-fast: false
      matrix:
        target:
          - tidbyt-gen1
          - matrixportal-s3-waveshare
          - matrixportal-s3-128x32

    env:
      IDF_CCACHE_ENABLE: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ matrix.target }}-${{ hashFiles('**/sdkconfig.defaults*') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.target }}-

      - name: Generate version header
        run: |
          if git describe --tags --abbrev=0 2>/dev/null; then
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          else
            VERSION=$(git describe --always --dirty)
          fi
          echo "Firmware version: $VERSION"

          cat > main/version.h << EOF
          // Auto-generated file - DO NOT EDIT
          // Generated by GitHub Actions
          #pragma once
          #define FIRMWARE_VERSION "$VERSION"
          EOF

      - name: Build Target
        run: |
          . $IDF_PATH/export.sh
          target="${{ matrix.target }}"
          echo "--------------------------------------"
          echo "Building target: $target"
          echo "--------------------------------------"
          
          # Determine chip type based on target
          case "$target" in
            pixora-s3*|matrixportal-s3*)
              chip="esp32s3"
              ;;
            *)
              chip="esp32"
              ;;
          esac
          case "$target" in
            tidbyt-gen1*)
              display="tidbyt"
              ;;
            *128x32*|pixora-s3-wide)
              display="128x32"
              ;;
            matrixportal-s3*|pixora-s3)
              display="64x32"
              ;;
            *)
              display="$target"
              ;;
          esac

          BUILD_DIR="build_$target"

          # Set the target and apply sdkconfig defaults
          idf.py -B "$BUILD_DIR" -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.$target" set-target "$chip"
          idf.py -B "$BUILD_DIR" build

          if [ ! -f "$BUILD_DIR/firmware.bin" ]; then
            echo "❌ Failed to generate firmware for $target"
            exit 1
          fi

          version="${GITHUB_REF_NAME#v}"
          if [ -z "$version" ] || [ "$version" = "$GITHUB_REF_NAME" ]; then
            version="$VERSION"
          fi

          ota_name="pixora-v${version}-${display}-ota-firmware.bin"
          usb_name="pixora-v${version}-${display}-usb-full-flash.bin"
          bootloader_name="pixora-v${version}-${display}-bootloader.bin"
          partition_name="pixora-v${version}-${display}-partition-table.bin"
          flash_args_name="pixora-v${version}-${display}-flash-args.txt"
          mkdir -p "$display"

          # Generate merged binary
          echo "Generating merged binary for $chip..."
          # Run esptool from within the build directory so relative paths in flash_args work
          (cd "$BUILD_DIR" && python -m esptool --chip "$chip" merge_bin -o "merged_firmware.bin" @flash_args)

          # Descriptive release names prevent selecting a firmware image for the wrong target or flash method.
          cp "$BUILD_DIR/firmware.bin" "$display/$ota_name"
          cp "$BUILD_DIR/merged_firmware.bin" "$display/$usb_name"
          cp "$BUILD_DIR/bootloader/bootloader.bin" "$display/$bootloader_name"
          cp "$BUILD_DIR/partition_table/partition-table.bin" "$display/$partition_name"
          cp "$BUILD_DIR/flash_args" "$display/$flash_args_name"

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}_firmware
          path: |
            tidbyt/pixora-v*-tidbyt-ota-firmware.bin
            tidbyt/pixora-v*-tidbyt-usb-full-flash.bin
            tidbyt/pixora-v*-tidbyt-bootloader.bin
            tidbyt/pixora-v*-tidbyt-partition-table.bin
            tidbyt/pixora-v*-tidbyt-flash-args.txt
            64x32/pixora-v*-64x32-ota-firmware.bin
            64x32/pixora-v*-64x32-usb-full-flash.bin
            64x32/pixora-v*-64x32-bootloader.bin
            64x32/pixora-v*-64x32-partition-table.bin
            64x32/pixora-v*-64x32-flash-args.txt
            128x32/pixora-v*-128x32-ota-firmware.bin
            128x32/pixora-v*-128x32-usb-full-flash.bin
            128x32/pixora-v*-128x32-bootloader.bin
            128x32/pixora-v*-128x32-partition-table.bin
            128x32/pixora-v*-128x32-flash-args.txt
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          pattern: '*_firmware'
          merge-multiple: true

      - name: Display Artifacts
        run: ls -R release-artifacts/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          # Collect all artifacts and pass them to gh release create as positional arguments
          gh release create "$tag" \
              --repo="${GITHUB_REPOSITORY}" \
              --title="${GITHUB_REPOSITORY#*/} ${tag#v}" \
              --generate-notes \
              $(find release-artifacts -type f -print0 | xargs -0)
