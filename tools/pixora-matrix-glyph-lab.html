<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixora Matrix Glyph Lab</title>
  <style>
    :root {
      --bg: #08090b;
      --panel: #11151a;
      --panel-2: #171d24;
      --line: #2a333d;
      --text: #eef5f7;
      --muted: #93a2ad;
      --accent: #20d6c5;
      --warn: #f0c24d;
      --danger: #ff6876;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #08090b;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #1b232b;
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }

    button:hover,
    button.is-active {
      border-color: var(--accent);
      color: #dffdfa;
    }

    .shell {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1,
    h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 22px;
    }

    h2 {
      font-size: 15px;
    }

    .subtle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .matrix-wrap {
      position: relative;
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #020303;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.42);
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    #matrix {
      width: min(100%, 1024px);
      max-width: 1024px;
      aspect-ratio: 2 / 1;
      margin: 0 auto;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-body {
      padding: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #080c10;
      color: var(--text);
      min-height: 34px;
      padding: 7px 9px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1.35;
    }

    .inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .check input {
      width: auto;
      min-height: auto;
    }

    .digit-tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    #editor {
      width: 100%;
      aspect-ratio: 5 / 7;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #050607;
    }

    .glyph-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .code {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #080c10;
      color: #c9f5ee;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0c1116;
      padding: 8px;
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      color: var(--text);
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .layout,
      .controls {
        grid-template-columns: 1fr;
      }

      .status {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div>
        <h1>Pixora Matrix Glyph Lab</h1>
        <p class="subtle">64x32 RGB matrix buffer with 0-63 x coordinates and 0-31 y coordinates.</p>
      </div>
      <div class="inline">
        <button type="button" id="clearBtn">Clear</button>
        <button type="button" id="demoBtn">Demo</button>
      </div>
    </div>

    <div class="layout">
      <section>
        <div class="matrix-wrap">
          <canvas id="matrix" width="1024" height="512" aria-label="64 by 32 LED matrix preview"></canvas>
        </div>

        <div class="status">
          <div class="stat">Buffer<strong>64 x 32</strong></div>
          <div class="stat">Usable X<strong id="usableStat">0-63</strong></div>
          <div class="stat">LED Size<strong id="ledStat">12 px</strong></div>
          <div class="stat">Cursor<strong id="cursorStat">-</strong></div>
        </div>

        <div class="controls panel">
          <div class="panel-body field">
            <label for="sampleText">Text</label>
            <input id="sampleText" value="0123456789" maxlength="32">
          </div>
          <div class="panel-body field">
            <label for="drawX">X</label>
            <input id="drawX" type="number" min="-64" max="64" value="1">
          </div>
          <div class="panel-body field">
            <label for="drawY">Y</label>
            <input id="drawY" type="number" min="-32" max="32" value="4">
          </div>
          <div class="panel-body field">
            <label for="colorPick">Color</label>
            <input id="colorPick" type="color" value="#ffffff">
          </div>
        </div>

        <div class="panel" style="margin-top:14px;">
          <div class="panel-head">
            <h2>Panel Options</h2>
          </div>
          <div class="panel-body inline">
            <label class="check"><input id="showGrid" type="checkbox" checked> LED wells</label>
            <label class="check"><input id="showCoords" type="checkbox"> coordinate ticks</label>
            <label class="check"><input id="crop63" type="checkbox"> mask x=63 for 63-column tests</label>
            <label class="check"><input id="glow" type="checkbox" checked> glow</label>
          </div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <h2>Bold Digit Glyphs</h2>
        </div>
        <div class="panel-body">
          <div class="digit-tabs" id="digitTabs"></div>
          <canvas id="editor" width="250" height="350" aria-label="5 by 7 digit glyph editor"></canvas>
          <div class="glyph-actions">
            <button type="button" id="applyTextBtn">Render Text</button>
            <button type="button" id="resetGlyphsBtn">Reset Glyphs</button>
            <button type="button" id="saveGlyphsBtn">Save Local</button>
            <button type="button" id="exportGlyphsBtn">Export JSON</button>
            <button type="button" id="importGlyphsBtn">Import JSON</button>
          </div>
          <input id="importGlyphsFile" type="file" accept="application/json,.json" style="display:none;">
          <div class="field" style="margin-top:12px;">
            <label for="glyphJson">Current 0-9 Glyph Table</label>
            <textarea id="glyphJson" spellcheck="false"></textarea>
          </div>
          <p class="subtle" id="saveStatus">Edits autosave in this browser.</p>
          <div class="code" id="glyphReadout"></div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const MATRIX_W = 64;
    const MATRIX_H = 32;
    const LED_PITCH = 16;
    const LED_RADIUS = 5.35;
    const STORAGE_KEY = "pixora-matrix-glyph-lab.glyphs.v1";

    const DEFAULT_GLYPHS = {
      "0": ["01110", "11011", "11011", "11011", "11011", "11011", "01110"],
      "1": ["01110", "11110", "00110", "00110", "00110", "00110", "11111"],
      "2": ["11110", "00011", "00011", "11110", "11000", "11000", "11111"],
      "3": ["11110", "00011", "00011", "01110", "00011", "00011", "11110"],
      "4": ["11011", "11011", "11011", "11111", "00011", "00011", "00011"],
      "5": ["11111", "11000", "11000", "11110", "00011", "00011", "11110"],
      "6": ["01111", "11000", "11000", "11110", "11011", "11011", "01110"],
      "7": ["11111", "00011", "00110", "00110", "01100", "01100", "01100"],
      "8": ["01110", "11011", "11011", "01110", "11011", "11011", "01110"],
      "9": ["01110", "11011", "11011", "01111", "00011", "11011", "01110"]
    };

    let glyphs = loadStoredGlyphs() || JSON.parse(JSON.stringify(DEFAULT_GLYPHS));
    let activeDigit = "0";
    let pixels = new Array(MATRIX_W * MATRIX_H).fill(null);

    const matrix = document.getElementById("matrix");
    const ctx = matrix.getContext("2d");
    const editor = document.getElementById("editor");
    const ectx = editor.getContext("2d");

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      return {
        r: parseInt(clean.slice(0, 2), 16),
        g: parseInt(clean.slice(2, 4), 16),
        b: parseInt(clean.slice(4, 6), 16)
      };
    }

    function rgba(color, alpha) {
      return `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
    }

    function setPixel(x, y, color) {
      if (x < 0 || x >= MATRIX_W || y < 0 || y >= MATRIX_H) return;
      pixels[y * MATRIX_W + x] = color;
    }

    function validateGlyphs(value) {
      for (let i = 0; i <= 9; i++) {
        const digit = String(i);
        if (!Array.isArray(value[digit]) || value[digit].length !== 7) throw new Error(`Digit ${digit} must have 7 rows.`);
        if (!value[digit].every(row => typeof row === "string" && /^[01]{5}$/.test(row))) throw new Error(`Digit ${digit} rows must be 5 bits.`);
      }
    }

    function loadStoredGlyphs() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved) return null;
        validateGlyphs(saved);
        return saved;
      } catch {
        return null;
      }
    }

    function saveGlyphsLocal(message) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(glyphs));
      document.getElementById("saveStatus").textContent = message || `Saved locally at ${new Date().toLocaleTimeString()}.`;
    }

    function exportGlyphs() {
      const blob = new Blob([JSON.stringify(glyphs, null, 2) + "\n"], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "pixora-bold-digits.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      document.getElementById("saveStatus").textContent = "Exported pixora-bold-digits.json.";
    }

    function clearPixels() {
      pixels.fill(null);
    }

    function drawGlyph(ch, x, y, color) {
      const glyph = glyphs[ch];
      if (!glyph) return 0;
      for (let gy = 0; gy < glyph.length; gy++) {
        for (let gx = 0; gx < glyph[gy].length; gx++) {
          if (glyph[gy][gx] === "1") setPixel(x + gx, y + gy, color);
        }
      }
      return 6;
    }

    function drawText(text, x, y, color) {
      let cursor = x;
      for (const ch of text) {
        if (ch === " ") {
          cursor += 4;
        } else {
          cursor += drawGlyph(ch, cursor, y, color);
        }
      }
    }

    function renderMatrix() {
      const showGrid = document.getElementById("showGrid").checked;
      const showCoords = document.getElementById("showCoords").checked;
      const crop63 = document.getElementById("crop63").checked;
      const useGlow = document.getElementById("glow").checked;

      ctx.clearRect(0, 0, matrix.width, matrix.height);
      ctx.fillStyle = "#020303";
      ctx.fillRect(0, 0, matrix.width, matrix.height);

      for (let y = 0; y < MATRIX_H; y++) {
        for (let x = 0; x < MATRIX_W; x++) {
          const cx = x * LED_PITCH + LED_PITCH / 2;
          const cy = y * LED_PITCH + LED_PITCH / 2;
          const off = crop63 && x === 63;
          const color = off ? null : pixels[y * MATRIX_W + x];

          if (showGrid) {
            ctx.beginPath();
            ctx.fillStyle = off ? "#050607" : "#111315";
            ctx.arc(cx, cy, LED_RADIUS, 0, Math.PI * 2);
            ctx.fill();
          }

          if (color) {
            if (useGlow) {
              const grad = ctx.createRadialGradient(cx, cy, 1, cx, cy, LED_PITCH * 0.75);
              grad.addColorStop(0, rgba(color, 0.85));
              grad.addColorStop(0.45, rgba(color, 0.35));
              grad.addColorStop(1, rgba(color, 0));
              ctx.fillStyle = grad;
              ctx.fillRect(cx - LED_PITCH, cy - LED_PITCH, LED_PITCH * 2, LED_PITCH * 2);
            }
            ctx.beginPath();
            ctx.fillStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
            ctx.arc(cx, cy, LED_RADIUS * 0.92, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.fillStyle = "rgba(255,255,255,0.38)";
            ctx.arc(cx - 1.8, cy - 1.8, LED_RADIUS * 0.25, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      if (showCoords) drawCoordinateTicks(crop63 ? 63 : 64);
      document.getElementById("usableStat").textContent = crop63 ? "0-62" : "0-63";
      document.getElementById("ledStat").textContent = `${Math.round(LED_PITCH * matrix.clientWidth / matrix.width)} px`;
    }

    function drawCoordinateTicks(activeWidth) {
      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,0.42)";
      ctx.font = "10px Consolas, monospace";
      for (let x = 0; x < activeWidth; x += 8) {
        ctx.fillText(String(x), x * LED_PITCH + 1, 10);
      }
      for (let y = 8; y < MATRIX_H; y += 8) {
        ctx.fillText(String(y), 1, y * LED_PITCH + 10);
      }
      ctx.restore();
    }

    function renderEditor() {
      const glyph = glyphs[activeDigit];
      const cellW = editor.width / 5;
      const cellH = editor.height / 7;
      ectx.clearRect(0, 0, editor.width, editor.height);
      ectx.fillStyle = "#050607";
      ectx.fillRect(0, 0, editor.width, editor.height);

      for (let y = 0; y < 7; y++) {
        for (let x = 0; x < 5; x++) {
          ectx.strokeStyle = "#2a333d";
          ectx.strokeRect(x * cellW, y * cellH, cellW, cellH);
          if (glyph[y][x] === "1") {
            ectx.fillStyle = "#f4f7f8";
            ectx.beginPath();
            ectx.arc(x * cellW + cellW / 2, y * cellH + cellH / 2, Math.min(cellW, cellH) * 0.28, 0, Math.PI * 2);
            ectx.fill();
          }
        }
      }

      document.getElementById("glyphJson").value = JSON.stringify(glyphs, null, 2);
      document.getElementById("glyphReadout").textContent = `${activeDigit}:\n${glyph.join("\n")}`;
      document.querySelectorAll("[data-digit]").forEach(btn => {
        btn.classList.toggle("is-active", btn.dataset.digit === activeDigit);
      });
    }

    function renderTextFromControls() {
      clearPixels();
      const color = hexToRgb(document.getElementById("colorPick").value);
      const text = document.getElementById("sampleText").value;
      const x = parseInt(document.getElementById("drawX").value, 10) || 0;
      const y = parseInt(document.getElementById("drawY").value, 10) || 0;
      drawText(text, x, y, color);
      renderMatrix();
    }

    function loadDemo() {
      clearPixels();
      drawText("MSFT", 2, 2, hexToRgb("#ffffff"));
      drawText("-1.30%", 2, 13, hexToRgb("#ff1d25"));
      drawText("$416.79", 2, 23, hexToRgb("#00e42b"));
      drawText("01234", 32, 2, hexToRgb("#fff200"));
      drawText("56789", 32, 13, hexToRgb("#18e7ff"));
      renderMatrix();
    }

    function buildTabs() {
      const tabs = document.getElementById("digitTabs");
      tabs.innerHTML = "";
      for (let i = 0; i <= 9; i++) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = String(i);
        btn.dataset.digit = String(i);
        btn.addEventListener("click", () => {
          activeDigit = String(i);
          renderEditor();
        });
        tabs.appendChild(btn);
      }
    }

    editor.addEventListener("click", (event) => {
      const rect = editor.getBoundingClientRect();
      const x = Math.floor((event.clientX - rect.left) / (rect.width / 5));
      const y = Math.floor((event.clientY - rect.top) / (rect.height / 7));
      const row = glyphs[activeDigit][y].split("");
      row[x] = row[x] === "1" ? "0" : "1";
      glyphs[activeDigit][y] = row.join("");
      renderEditor();
      saveGlyphsLocal("Autosaved locally.");
      renderTextFromControls();
    });

    matrix.addEventListener("mousemove", (event) => {
      const rect = matrix.getBoundingClientRect();
      const x = Math.floor((event.clientX - rect.left) / (rect.width / MATRIX_W));
      const y = Math.floor((event.clientY - rect.top) / (rect.height / MATRIX_H));
      document.getElementById("cursorStat").textContent =
        x >= 0 && x < MATRIX_W && y >= 0 && y < MATRIX_H ? `${x}, ${y}` : "-";
    });

    document.getElementById("glyphJson").addEventListener("change", () => {
      try {
        const parsed = JSON.parse(document.getElementById("glyphJson").value);
        validateGlyphs(parsed);
        glyphs = parsed;
        renderEditor();
        saveGlyphsLocal("Saved JSON edits locally.");
        renderTextFromControls();
      } catch (error) {
        alert(error.message);
        renderEditor();
      }
    });

    ["sampleText", "drawX", "drawY", "colorPick"].forEach(id => {
      document.getElementById(id).addEventListener("input", renderTextFromControls);
    });
    ["showGrid", "showCoords", "crop63", "glow"].forEach(id => {
      document.getElementById(id).addEventListener("change", renderMatrix);
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
      clearPixels();
      renderMatrix();
    });
    document.getElementById("demoBtn").addEventListener("click", loadDemo);
    document.getElementById("applyTextBtn").addEventListener("click", renderTextFromControls);
    document.getElementById("resetGlyphsBtn").addEventListener("click", () => {
      glyphs = JSON.parse(JSON.stringify(DEFAULT_GLYPHS));
      renderEditor();
      saveGlyphsLocal("Reset to defaults and saved locally.");
      renderTextFromControls();
    });
    document.getElementById("saveGlyphsBtn").addEventListener("click", () => saveGlyphsLocal());
    document.getElementById("exportGlyphsBtn").addEventListener("click", exportGlyphs);
    document.getElementById("importGlyphsBtn").addEventListener("click", () => {
      document.getElementById("importGlyphsFile").click();
    });
    document.getElementById("importGlyphsFile").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        validateGlyphs(parsed);
        glyphs = parsed;
        renderEditor();
        saveGlyphsLocal(`Imported ${file.name} and saved locally.`);
        renderTextFromControls();
      } catch (error) {
        alert(error.message);
      } finally {
        event.target.value = "";
      }
    });

    buildTabs();
    renderEditor();
    saveGlyphsLocal(loadStoredGlyphs() ? "Loaded saved local glyphs." : "Loaded default glyphs.");
    renderTextFromControls();
  </script>
</body>
</html>
