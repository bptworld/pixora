<!DOCTYPE html>
<html>
<head>
  <title>Pixora Setup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #111;
      color: #f4f4f4;
    }
    h1 { margin: 0 0 6px; color: #fff; }
    h3 { color: #fff; }
    p { color: #bdbdbd; line-height: 1.4; }
    .form-container { max-width: 420px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
    }
    button {
      background-color: #14b8a6;
      color: #06110f;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background-color: #2dd4bf; }
    .hint { font-size: 13px; margin-top: 6px; word-break: break-all; }
    .endpoint { color: #7dd3fc; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .secondary {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 15px;
      color: #f4f4f4;
      border: 1px solid #444;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
    }
    .secondary:hover { border-color: #14b8a6; }
    hr { border: 0; border-top: 1px solid #333; margin: 24px 0; }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Pixora Setup</h1>
    <p>Add a display to this Windows Pixora install.</p>

    <form id="setup_form" onsubmit="return saveDevice()">
      <div class="form-group">
        <label for="ssid">Wi-Fi Network Name (2.4 GHz)</label>
        <input type="text" id="ssid" name="ssid" maxlength="32" required>
      </div>

      <div class="form-group">
        <label for="password">Wi-Fi Password</label>
        <input type="password" id="password" name="password" maxlength="64">
      </div>

      <input type="hidden" id="image_url" name="image_url" maxlength="128" value="">

      <div class="form-group">
        <label for="pixora_server">Pixora Server</label>
        <input type="text" id="pixora_server" maxlength="96" placeholder="http://pixora.local:8088" value="http://pixora.local:8088" required>
      </div>

      <div class="form-group">
        <label for="device_id">Device ID</label>
        <input type="text" id="device_id" maxlength="48" placeholder="kitchen-display" required>
        <p class="hint">Endpoint: <span id="endpoint_preview" class="endpoint"></span></p>
      </div>

      <div id="swap_colors_slot">{{SWAP_COLORS_BLOCK}}</div>

      <div class="actions">
        <button type="submit">Save Device</button>
        <a class="secondary" href="index.html">Back to Pixora</a>
      </div>
    </form>
  </div>

  <script>
    function cleanDeviceId(value) {
      return (value || "")
        .trim()
        .replace(/[^A-Za-z0-9_-]/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "") || "display";
    }

    function buildEndpoint() {
      var server = (document.getElementById("pixora_server").value.trim() || "http://pixora.local:8088").replace(/\/+$/, "");
      var deviceId = cleanDeviceId(document.getElementById("device_id").value);
      return server + "/" + deviceId + "/next";
    }

    function updatePreview() {
      document.getElementById("endpoint_preview").innerText = buildEndpoint();
    }

    function parseExisting() {
      var url = document.getElementById("image_url").value;
      if (!url || url.indexOf("{{") !== -1) {
        if (!document.getElementById("pixora_server").value.trim()) {
          document.getElementById("pixora_server").value = "http://pixora.local:8088";
        }
        updatePreview();
        return;
      }

      var match = url.match(/^(https?:\/\/[^/]+)\/([^/]+)\/next/);
      if (match) {
        document.getElementById("pixora_server").value = match[1];
        document.getElementById("device_id").value = match[2];
      }
      updatePreview();
    }

    function readDevices() {
      try {
        return JSON.parse(localStorage.getItem("pixora.devices") || "[]");
      } catch (error) {
        return [];
      }
    }

    function saveWifiFields() {
      localStorage.setItem("pixora.wifi.ssid", document.getElementById("ssid").value);
      localStorage.setItem("pixora.wifi.password", document.getElementById("password").value);
    }

    function restoreWifiFields() {
      var ssid = localStorage.getItem("pixora.wifi.ssid") || "";
      var password = localStorage.getItem("pixora.wifi.password") || "";
      if (ssid) {
        document.getElementById("ssid").value = ssid;
      }
      if (password) {
        document.getElementById("password").value = password;
      }
    }

    function saveDevice() {
      var deviceId = cleanDeviceId(document.getElementById("device_id").value);
      var endpoint = buildEndpoint();
      var devices = readDevices().filter(function(device) {
        return device.id !== deviceId;
      });

      devices.push({
        id: deviceId,
        name: deviceId.replace(/[-_]+/g, " "),
        ssid: document.getElementById("ssid").value.trim(),
        password: document.getElementById("password").value,
        server: document.getElementById("pixora_server").value.trim().replace(/\/+$/, ""),
        endpoint: endpoint,
        cards: [],
        createdAt: new Date().toISOString()
      });

      saveWifiFields();
      document.getElementById("device_id").value = deviceId;
      document.getElementById("image_url").value = endpoint;
      localStorage.setItem("pixora.devices", JSON.stringify(devices));
      localStorage.setItem("pixora.selectedDevice", deviceId);
      window.location.href = "index.html";
      return false;
    }

    document.addEventListener("DOMContentLoaded", function() {
      var swapSlot = document.getElementById("swap_colors_slot");
      if (swapSlot && swapSlot.innerText.indexOf("{{SWAP_COLORS_BLOCK}}") !== -1) {
        swapSlot.style.display = "none";
      }
      parseExisting();
      restoreWifiFields();
      document.getElementById("pixora_server").addEventListener("input", updatePreview);
      document.getElementById("device_id").addEventListener("input", updatePreview);
      document.getElementById("ssid").addEventListener("input", saveWifiFields);
      document.getElementById("password").addEventListener("input", saveWifiFields);
    });
  </script>
</body>
</html>
